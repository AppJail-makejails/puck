name: Build OCI image for puck

on:
  schedule:
    - cron: '0 0 21 * *'
  push:
    branches: [main]
    paths-ignore: ['*.md', 'LICENSE', '.gitignore']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    uses: appjail-makejails/workflows/.github/workflows/daemonless-build.yaml@main
    with:
      image_name: puck
    secrets: inherit
  workflow-keepalive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: liskin/gh-workflow-keepalive@v1
